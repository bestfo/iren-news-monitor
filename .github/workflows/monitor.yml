name: IREN News Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub may delay 5-15 min under load)
  workflow_dispatch:         # allow manual runs from the Actions tab

permissions:
  contents: write            # to commit state/seen.json updates back

concurrency:
  group: iren-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python monitor.py

      - name: Commit state if changed
        run: |
          if [[ -z "$(git status --porcelain state/seen.json)" ]]; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git commit -m "chore: update seen state [skip ci]"
          git push
